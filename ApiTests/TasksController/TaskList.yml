info:
  name: TaskList
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/tasks"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar('TestTaskId',res.getBody()[0].taskId)
        console.log("id-: "+bru.getVar('TestTaskId'))
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: ""
        method: jsonq
      variable:
        name: TestTaskId
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: exampleOutput
    description: Basic list
    request:
      url: http://localhost:8080/api/tasks
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: x-content-type-options
          value: nosniff
        - name: x-xss-protection
          value: "0"
        - name: cache-control
          value: no-cache, no-store, max-age=0, must-revalidate
        - name: pragma
          value: no-cache
        - name: expires
          value: "0"
        - name: x-frame-options
          value: DENY
        - name: content-type
          value: application/json
        - name: transfer-encoding
          value: chunked
        - name: date
          value: Fri, 10 Apr 2026 05:13:17 GMT
        - name: keep-alive
          value: timeout=60
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          [
            {
              "taskId": "8b6571da-d574-4b77-948a-2fff48f639ef",
              "title": "Implement user authentication",
              "description": "Add login functionality with JWT tokens",
              "status": "TO_DO",
              "storyPoints": 5,
              "sprintId": null,
              "blockedAt": null,
              "createdAt": "2026-04-10T03:13:17.830456Z",
              "deliveredAt": null,
              "aiFlagged": false
            }
          ]
