info:
  name: Changing Sprint State
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{baseUrl}}/api/sprints/{{sprint}}/status"
  body:
    type: json
    data: |-
      {
        "status": "ACTIVE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
